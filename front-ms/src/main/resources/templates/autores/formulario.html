<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section}, ${autorForm.id == null} ? 'Novo Autor' : 'Editar Autor')}">
<body>
<section>
    <!-- Page Title Card -->
    <div class="glass-card p-4 mb-4">
        <div class="d-flex align-items-center gap-3">
            <div class="bg-indigo p-3 rounded-circle text-white d-inline-flex justify-content-center align-items-center"
                 style="background: var(--accent-gradient); width: 48px; height: 48px;">
                <i class="bi bi-person-fill fs-4"></i>
            </div>
            <div>
                <h2 class="mb-1 text-light" th:text="${autorForm.id == null} ? 'Novo Autor' : 'Editar Autor'">Novo Autor</h2>
                <p class="text-secondary mb-0">Preencha as informações do autor nos campos abaixo.</p>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="glass-card p-4 col-md-8 col-lg-6 mx-auto">
        <form th:action="${autorForm.id != null} ? @{/autores/{id}(id=${autorForm.id})} : @{/autores}"
              th:object="${autorForm}" method="post" novalidate>
            
            <!-- Global errors display -->
            <div th:if="${#fields.hasGlobalErrors()}" class="alert-custom alert-danger-custom mb-4">
                <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                <div>
                    <p class="mb-0" th:each="gErr : ${#fields.globalErrors()}" th:text="${gErr}">Erro de validação geral.</p>
                </div>
            </div>
            
            <!-- Hidden ID Field for editing -->
            <input type="hidden" th:field="*{id}" />

            <!-- Nome Input -->
            <div class="mb-4">
                <label for="nome" class="form-label-custom">Nome Completo</label>
                <input type="text" id="nome" th:field="*{nome}" 
                       class="form-control form-control-custom"
                       th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid is-invalid-custom' : ''"
                       placeholder="Digite o nome do autor..." required autocomplete="off" />
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">
                    O nome é obrigatório.
                </div>
            </div>

            <!-- Nacionalidade Input -->
            <div class="mb-4">
                <label for="nacionalidade" class="form-label-custom">Nacionalidade</label>
                <input type="text" id="nacionalidade" th:field="*{nacionalidade}" 
                       class="form-control form-control-custom"
                       th:classappend="${#fields.hasErrors('nacionalidade')} ? 'is-invalid is-invalid-custom' : ''"
                       placeholder="Ex: Brasileira, Britânica, Americana..." required autocomplete="off" />
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('nacionalidade')}" th:errors="*{nacionalidade}">
                    A nacionalidade é obrigatória.
                </div>
            </div>

            <!-- Ano de Nascimento Input -->
            <div class="mb-4">
                <label for="anoNascimento" class="form-label-custom">Ano de Nascimento</label>
                <input type="number" id="anoNascimento" th:field="*{anoNascimento}" 
                       class="form-control form-control-custom"
                       th:classappend="${#fields.hasErrors('anoNascimento')} ? 'is-invalid is-invalid-custom' : ''"
                       placeholder="Ex: 1945" required />
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('anoNascimento')}" th:errors="*{anoNascimento}">
                    O ano de nascimento é obrigatório.
                </div>
            </div>

            <!-- Actions buttons -->
            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top border-secondary border-opacity-10">
                <a th:href="@{/autores}" class="btn-secondary-custom">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
                <button type="submit" class="btn-premium">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${autorForm.id == null} ? 'Salvar' : 'Atualizar'">Salvar</span>
                </button>
            </div>

        </form>
    </div>
</section>
</body>
</html>
