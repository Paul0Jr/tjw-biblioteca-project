<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content, title)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">BiblioTech</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5">
        <div class="container">
            <a class="navbar-brand navbar-brand-glow" th:href="@{/livros}">
                <i class="bi bi-book-half me-2"></i>BiblioTech
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a id="nav-livros" class="nav-link nav-link-custom" th:href="@{/livros}">
                            Livros
                        </a>
                    </li>
                    <li class="nav-item me-2">
                        <a id="nav-autores" class="nav-link nav-link-custom" th:href="@{/autores}">
                            Autores
                        </a>
                    </li>
                    <li class="nav-item d-flex align-items-center" sec:authorize="isAuthenticated()">
                        <span class="navbar-text me-3 text-light" style="font-size: 0.9rem;">
                            <span sec:authentication="name">User</span>
                        </span>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-danger px-3" style="border-radius: 8px;">
                                Sair
                            </button>
                        </form>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a th:href="@{/login}" class="btn btn-sm btn-outline-light px-3" style="border-radius: 8px; border-color: rgba(255, 255, 255, 0.25);">
                            Entrar
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container py-2 mb-5">
        <div th:replace="${content}"></div>
    </main>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Active link styling via JS -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            const navLivros = document.getElementById("nav-livros");
            const navAutores = document.getElementById("nav-autores");
            
            if (path.startsWith("/autores")) {
                navAutores.classList.add("active");
            } else if (path.startsWith("/livros") || path === "/") {
                navLivros.classList.add("active");
            }
        });
    </script>
</body>
</html>
