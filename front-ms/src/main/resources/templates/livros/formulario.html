
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section}, ${livroForm.id == null} ? 'Novo Livro' : 'Editar Livro')}">
<body>
<section>
    <!-- Page Title Card -->
    <div class="glass-card p-4 mb-4">
        <div class="d-flex align-items-center gap-3">
            <div class="bg-indigo p-3 rounded-circle text-white d-inline-flex justify-content-center align-items-center"
                 style="background: var(--accent-gradient); width: 48px; height: 48px;">
                <i class="bi bi-book fs-4"></i>
            </div>
            <div>
                <h2 class="mb-1 text-light" th:text="${livroForm.id == null} ? 'Novo Livro' : 'Editar Livro'">Novo Livro</h2>
                <p class="text-secondary mb-0">Preencha as informações do livro nos campos abaixo.</p>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="glass-card p-4 col-md-8 col-lg-6 mx-auto">
        <form th:action="${livroForm.id != null} ? @{/livros/{id}(id=${livroForm.id})} : @{/livros}"
              th:object="${livroForm}" method="post" novalidate>
            
            <!-- Global errors display -->
            <div th:if="${#fields.hasGlobalErrors()}" class="alert-custom alert-danger-custom mb-4">
                <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                <div>
                    <p class="mb-0" th:each="gErr : ${#fields.globalErrors()}" th:text="${gErr}">Erro de validação geral.</p>
                </div>
            </div>
            
            <!-- Hidden ID Field for editing -->
            <input type="hidden" th:field="*{id}" />

            <!-- Título Input -->
            <div class="mb-4">
                <label for="titulo" class="form-label-custom">Título do Livro</label>
                <input type="text" id="titulo" th:field="*{titulo}" 
                       class="form-control form-control-custom"
                       th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid is-invalid-custom' : ''"
                       placeholder="Ex: Cem Anos de Solidão" required autocomplete="off" />
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}">
                    O título é obrigatório.
                </div>
            </div>

            <!-- Gênero Input -->
            <div class="mb-4">
                <label for="genero" class="form-label-custom">Gênero Literário</label>
                <input type="text" id="genero" th:field="*{genero}" 
                       class="form-control form-control-custom"
                       th:classappend="${#fields.hasErrors('genero')} ? 'is-invalid is-invalid-custom' : ''"
                       placeholder="Ex: Realismo Mágico, Romance, Ficção Científica" required autocomplete="off" />
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}">
                    O gênero é obrigatório.
                </div>
            </div>

            <!-- Ano de Publicação Input -->
            <div class="mb-4">
                <label for="anoPublicacao" class="form-label-custom">Ano de Publicação</label>
                <input type="number" id="anoPublicacao" th:field="*{anoPublicacao}" 
                       class="form-control form-control-custom"
                       th:classappend="${#fields.hasErrors('anoPublicacao')} ? 'is-invalid is-invalid-custom' : ''"
                       placeholder="Ex: 1967" required />
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('anoPublicacao')}" th:errors="*{anoPublicacao}">
                    O ano de publicação é obrigatório.
                </div>
            </div>

            <!-- Autor Selection Dropdown -->
            <div class="mb-4">
                <label for="autorId" class="form-label-custom">Autor</label>
                <select id="autorId" th:field="*{autorId}" 
                        class="form-select form-select-custom"
                        th:classappend="${#fields.hasErrors('autorId')} ? 'is-invalid is-invalid-custom' : ''" required>
                    <option value="">Selecione um autor...</option>
                    <option th:each="autor : ${autores}" 
                            th:value="${autor.id}" 
                            th:text="${autor.nome}">Gabriel García Márquez</option>
                </select>
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('autorId')}" th:errors="*{autorId}">
                    O autor é obrigatório.
                </div>
                <div class="form-text text-secondary fs-7 mt-1">
                    Não encontrou o autor? <a th:href="@{/autores/novo}" class="text-indigo" style="color: #8b5cf6; text-decoration: none;">Cadastre-o aqui</a> primeiro.
                </div>
            </div>

            <!-- Disponibilidade Toggle / Radio Buttons -->
            <div class="mb-4">
                <label class="form-label-custom d-block">Disponibilidade para Empréstimo</label>
                <div class="mt-2 d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="disponivelSim" th:value="true" th:field="*{disponivel}" style="cursor: pointer;" />
                        <label class="form-check-label text-light" for="disponivelSim" style="cursor: pointer;">
                            <span class="badge-custom badge-sim py-0.5 px-2.5 fs-7"><i class="bi bi-check-circle-fill"></i> Dgisponível</span>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="disponivelNao" th:value="false" th:field="*{disponivel}" style="cursor: pointer;" />
                        <label class="form-check-label text-light" for="disponivelNao" style="cursor: pointer;">
                            <span class="badge-custom badge-nao py-0.5 px-2.5 fs-7"><i class="bi bi-x-circle-fill"></i> Não, indisponível</span>
                        </label>
                    </div>
                </div>
                <div class="invalid-feedback-custom" th:if="${#fields.hasErrors('disponivel')}" th:errors="*{disponivel}">
                    Selecione a disponibilidade.
                </div>
            </div>

            <!-- Actions buttons -->
            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top border-secondary border-opacity-10">
                <a th:href="@{/livros}" class="btn-secondary-custom">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
                <button type="submit" class="btn-premium">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${livroForm.id == null} ? 'Salvar' : 'Atualizar'">Salvar</span>
                </button>
            </div>

        </form>
    </div>
</section>
</body>
</html>
