services:
  postgres-autores:
    image: postgres:15-alpine
    container_name: postgres-autores
    environment:
      POSTGRES_DB: db_autores
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_autores:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_autores"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-livros:
    image: postgres:15-alpine
    container_name: postgres-livros
    environment:
      POSTGRES_DB: db_livros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_livros:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_livros"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-usuarios:
    image: postgres:15-alpine
    container_name: postgres-usuarios
    environment:
      POSTGRES_DB: db_usuarios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_usuarios:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_usuarios"]
      interval: 5s
      timeout: 5s
      retries: 5

  autor-ms:
    build:
      context: ./autor-ms
      dockerfile: Dockerfile
    container_name: autor-ms
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - DB_HOST=postgres-autores
      - DB_PORT=5432
      - DB_NAME=db_autores
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres-autores:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./autor-ms
          ignore:
            - ./autor-ms/target/

  livro-ms:
    build:
      context: ./livro-ms
      dockerfile: Dockerfile
    container_name: livro-ms
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - DB_HOST=postgres-livros
      - DB_PORT=5432
      - DB_NAME=db_livros
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres-livros:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./livro-ms
          ignore:
            - ./livro-ms/target/

  usuario-ms:
    build:
      context: ./usuario-ms
      dockerfile: Dockerfile
    container_name: usuario-ms
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - DB_HOST=postgres-usuarios
      - DB_PORT=5432
      - DB_NAME=db_usuarios
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres-usuarios:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./usuario-ms
          ignore:
            - ./usuario-ms/target/

  front-ms:
    build:
      context: ./front-ms
      dockerfile: Dockerfile
    container_name: front-ms
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - AUTOR_MS_URL=http://autor-ms:8082
      - LIVRO_MS_URL=http://livro-ms:8081
    depends_on:
      - autor-ms
      - livro-ms
    develop:
      watch:
        - action: rebuild
          path: ./front-ms
          ignore:
            - ./front-ms/target/

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - front-ms
      - autor-ms
      - livro-ms
      - usuario-ms

volumes:
  postgres_data_autores:
  postgres_data_livros:
  postgres_data_usuarios:
