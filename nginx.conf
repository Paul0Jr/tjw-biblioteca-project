events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Definição dos Upstreams utilizando os nomes dos serviços do Docker Compose
    upstream front-ms {
        server front-ms:8080;
    }

    # livro-ms roda na porta 8081 no Docker Compose, conforme o roteiro
    upstream livro-ms {
        server livro-ms:8081;
    }

    # autor-ms roda na porta 8082 no Docker Compose, conforme o roteiro
    upstream autor-ms {
        server autor-ms:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # Centralização de CORS se necessário (opcional, já que estão na mesma origem)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Tratamento de requisições OPTIONS (CORS preflight)
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Roteamento para livro-ms
        location /api/livros {
            proxy_pass http://livro-ms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajuste de timeout para APIs
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Roteamento para autor-ms
        location /api/autores {
            proxy_pass http://autor-ms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ajuste de timeout para APIs
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Roteamento padrão para o frontend front-ms
        location / {
            proxy_pass http://front-ms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Suporte a WebSockets se o Spring Boot DevTools estiver em uso
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Página de erro customizada para o gateway
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
