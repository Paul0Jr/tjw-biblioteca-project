services:
  postgres:
    image: postgres:17

    container_name: usuario-db

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${DB_PORT}:${DB_PORT}"

    volumes:
      - postgres_data:/var/lib/postgresql/data

